<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Elementos de Red</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>

  <style>
    :root {
      --bg-color:#0b141d;
      --card-color:#14212d;
      --accent-color:#00b894;
      --hover-color:#00d1a7;
      --success-color:#27ae60;
      --warning-color:#f39c12;
      --danger-color:#e74c3c;
      --text-color:#ffffff;
      --muted-text:#a0aec0;
      --border-color:#2c3e50;
      --input-bg:#0b141d;
    }

    * { box-sizing:border-box; }

    body {
      font-family:'Segoe UI', Arial, sans-serif;
      background-color:var(--bg-color);
      color:var(--text-color);
      margin:0;
      padding:0;
      min-width:1100px;
    }

    header {
      background-color:var(--card-color);
      padding:10px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border-color);
      gap:18px;
      position:sticky;
      top:0;
      z-index:50;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:16px;
      min-width:400px;
    }

    .logo-box {
      background:#ffffff;
      padding:5px 10px;
      border-radius:4px;
      display:flex;
      align-items:center;
    }

    .logo-box img {
      height:32px;
      display:block;
    }

    .brand h2 {
      margin:0;
      color:#ffffff;
      font-size:20px;
      font-weight:900;
      letter-spacing:.7px;
      white-space:nowrap;
    }

    .top-user-info {
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      flex-wrap:wrap;
      font-size:13px;
    }

    .top-user-info .info-item span {
      color:var(--accent-color);
      font-weight:900;
    }

    .btn-logout {
      background:var(--danger-color);
      color:white;
      border:none;
      padding:8px 13px;
      border-radius:4px;
      cursor:pointer;
      font-weight:800;
    }

    .btn-logout:hover {
      background:var(--warning-color);
    }

    .container {
      max-width:1840px;
      margin:18px auto;
      padding:0 18px 25px;
    }

    .resumen-row {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
      margin-bottom:12px;
    }

    .resumen-card {
      background:var(--card-color);
      border:1px solid var(--border-color);
      border-radius:8px;
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:78px;
      box-shadow:0 3px 6px rgba(0,0,0,.24);
    }

    .resumen-card .titulo {
      font-size:14px;
      font-weight:900;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .resumen-card .numero {
      font-size:28px;
      font-weight:900;
    }

    .pendiente i { color:#ff6b6b; }
    .solicitado i { color:#f1c40f; }
    .ejecutado i { color:#2ecc71; }

    .panel-box {
      background:var(--card-color);
      border:1px solid var(--border-color);
      border-radius:8px;
      padding:14px;
      box-shadow:0 4px 6px rgba(0,0,0,.28);
    }

    .filtros-panel {
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      align-items:end;
      border-bottom:1px solid var(--border-color);
      padding-bottom:14px;
      margin-bottom:12px;
    }

    .filtro-grupo {
      display:flex;
      flex-direction:column;
      gap:5px;
    }

    .filtro-grupo label {
      font-size:12px;
      color:var(--muted-text);
      font-weight:800;
      white-space:nowrap;
    }

    .input-filtro {
      width:100%;
      padding:8px 10px;
      border-radius:5px;
      background:var(--input-bg);
      color:#ffffff;
      border:1px solid var(--border-color);
      font-size:13px;
      outline:none;
      color-scheme:dark;
      min-height:34px;
    }

    .input-filtro:focus {
      border-color:var(--accent-color);
      box-shadow:0 0 0 2px rgba(0,184,148,.18);
    }

    .btn-limpiar {
      background:#34495e;
      color:white;
      border:1px solid var(--border-color);
      padding:8px 12px;
      border-radius:5px;
      cursor:pointer;
      font-weight:800;
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    .btn-limpiar:hover {
      background:var(--danger-color);
      border-color:var(--danger-color);
    }

    .table-responsive {
      overflow-x:auto;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
      table-layout:auto;
    }

    th, td {
      padding:10px 11px;
      text-align:left;
      border-bottom:1px solid var(--border-color);
      font-size:13px;
      vertical-align:middle;
      line-height:1.25;
    }

    th {
      background-color:var(--accent-color);
      color:#ffffff;
      font-weight:800;
    }

    tbody tr:hover {
      background:#264d43;
    }

    .col-id { width:150px; white-space:nowrap; }
    .col-fecha { width:125px; white-space:nowrap; }
    .col-circuito { width:160px; white-space:nowrap; }
    .col-direccion { min-width:330px; }
    .col-prioridad { width:120px; text-align:center; }
    .col-acciones { width:330px; text-align:center; }

    .badge {
      display:inline-flex;
      justify-content:center;
      min-width:82px;
      padding:5px 8px;
      border-radius:50px;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
    }

    .badge-alta {
      background:#5b1f1f;
      color:#ff8a8a;
      border:1px solid #e74c3c;
    }

    .badge-media {
      background:#5b4614;
      color:#ffd166;
      border:1px solid #f39c12;
    }

    .badge-baja {
      background:#143d27;
      color:#7ee2a8;
      border:1px solid #27ae60;
    }

    .acciones-td {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      white-space:nowrap;
    }

    .btn-icon {
      min-width:92px;
      height:38px;
      padding:0 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      color:#ffffff;
      font-size:13px;
      font-weight:900;
      transition:all .2s ease;
    }

    .btn-icon:hover {
      transform:translateY(-1px);
      box-shadow:0 0 8px rgba(255,255,255,.22);
    }

    .btn-pdf { background:#e74c3c; }
    .btn-solicitar { background:#f39c12; }
    .btn-control { background:#27ae60; }

    .mensaje-tabla {
      text-align:center;
      color:#d8e2ee;
      padding:25px;
      font-weight:800;
    }

    .mensaje-error {
      color:#ff8a8a;
    }
  </style>
</head>

<body>

<header>
  <div class="brand">
    <div class="logo-box">
      <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="Logo UTCD">
    </div>
    <h2>PANEL ELEMENTOS DE RED</h2>
  </div>

  <div class="top-user-info">
    <span class="info-item"><i class="fas fa-user-circle"></i> <span id="nombreUsuario">Usuario</span></span>
    <span>|</span>
    <span class="info-item"><i class="fas fa-user-tag"></i> <span id="tipoUsuario">Tipo</span></span>
    <span>|</span>
    <span class="info-item"><i class="fas fa-map-marker-alt"></i> <span id="nombreSector">Sector</span></span>

    <button class="btn-logout" onclick="cerrarSesion()">
      <i class="fas fa-sign-out-alt"></i> Cerrar sesión
    </button>
  </div>
</header>

<div class="container">

  <div class="resumen-row">
    <div class="resumen-card pendiente">
      <div class="titulo"><i class="fas fa-circle"></i> Pendientes</div>
      <div class="numero" id="totalPendiente">0</div>
    </div>

    <div class="resumen-card solicitado">
      <div class="titulo"><i class="fas fa-circle"></i> Solicitados</div>
      <div class="numero" id="totalSolicitado">0</div>
    </div>

    <div class="resumen-card ejecutado">
      <div class="titulo"><i class="fas fa-circle"></i> Ejecutados</div>
      <div class="numero" id="totalEjecutado">0</div>
    </div>
  </div>

  <div class="panel-box">

    <div class="filtros-panel">
      <div class="filtro-grupo">
        <label>Estado:</label>
        <select id="filtroEstado" class="input-filtro" onchange="renderizarTabla()">
          <option value="ALL">Todos</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="SOLICITADO">Solicitado</option>
          <option value="EJECUTADO">Ejecutado</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label>Prioridad:</label>
        <select id="filtroPrioridad" class="input-filtro" onchange="renderizarTabla()">
          <option value="ALL">Todas</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label>Circuito:</label>
        <select id="filtroCircuito" class="input-filtro" onchange="renderizarTabla()">
          <option value="ALL">Todos</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label>Material/Altura:</label>
        <select id="filtroMaterial" class="input-filtro" onchange="renderizarTabla()">
          <option value="ALL">Todos</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label>ID Elemento:</label>
        <input id="filtroIdElemento" class="input-filtro" placeholder="Buscar ID..." oninput="renderizarTabla()">
      </div>

      <div class="filtro-grupo">
        <label>Fecha desde:</label>
        <input type="date" id="fechaDesde" class="input-filtro" onchange="renderizarTabla()">
      </div>

      <div class="filtro-grupo">
        <label>Fecha hasta:</label>
        <input type="date" id="fechaHasta" class="input-filtro" onchange="renderizarTabla()">
      </div>

      <button class="btn-limpiar" onclick="limpiarFiltros()">
        <i class="fas fa-times-circle"></i> Limpiar filtros
      </button>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th class="col-id">ID Elemento</th>
            <th class="col-fecha">Fecha</th>
            <th class="col-circuito">Circuito</th>
            <th class="col-direccion">Dirección</th>
            <th class="col-prioridad">Prioridad</th>
            <th class="col-acciones">Acciones</th>
          </tr>
        </thead>

        <tbody id="tablaElementos">
          <tr>
            <td colspan="6" class="mensaje-tabla">Cargando elementos...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
  let elementosGlobal = [];

  const COL = {
    ID_ELEMENTO: "ID_ELEMENTO",
    FECHA_REGISTRO: "FECHA_HORA_REGISTRO",
    FECHA: "FECHA",
    CIRCUITO: "CIRCUITO",
    DIRECCION: "DIRECCION",
    PRIORIDAD: "PRIORIDAD",
    MATERIAL: "MATERIAL/ALTURA",
    ESTADO: "ESTADO",
    SECTOR: "SECTOR",
    FILE: "FILE"
  };

  document.addEventListener("DOMContentLoaded", function() {
    validarSesion();
    cargarElementos();
  });

  function validarSesion() {
    const usuario = sessionStorage.getItem("usuario");
    const tipoUsuario = sessionStorage.getItem("tipo_usuario");
    const sector = sessionStorage.getItem("sector");

    if (!usuario) {
      window.location.href = "index.html";
      return;
    }

    document.getElementById("nombreUsuario").textContent = usuario || "";
    document.getElementById("tipoUsuario").textContent = tipoUsuario || "";
    document.getElementById("nombreSector").textContent = sector || "";
  }

 function apiJSONP(params) {
  return new Promise((resolve, reject) => {
    const callbackName = "jsonp_" + Date.now();

    params.callback = callbackName;

    const query = new URLSearchParams(params).toString();
    const script = document.createElement("script");

    window[callbackName] = function(data) {
      resolve(data);
      script.remove();
      delete window[callbackName];
    };

    script.onerror = function() {
      reject(new Error("Error conectando con Apps Script"));
      script.remove();
      delete window[callbackName];
    };

    script.src = CONFIG.URL_APPS_SCRIPT + "?" + query;
    document.body.appendChild(script);
  });
}

async function cargarElementos() {
  try {
    const data = await apiJSONP({
      action: "obtenerElementos"
    });

    if (!data.ok) {
      mostrarMensajeTabla(data.error || "No se pudieron cargar los elementos.", true);
      return;
    }

    elementosGlobal = data.registros || [];

    llenarFiltros();
    actualizarResumen();
    renderizarTabla();

  } catch (error) {
    mostrarMensajeTabla("Error de conexión con Apps Script.", true);
  }
}

  function llenarFiltros() {
    llenarSelect("filtroPrioridad", obtenerUnicos(COL.PRIORIDAD), "Todas");
    llenarSelect("filtroCircuito", obtenerUnicosCircuito(), "Todos");
    llenarSelect("filtroMaterial", obtenerUnicos(COL.MATERIAL), "Todos");
  }

  function llenarSelect(idSelect, valores, textoDefault) {
    const select = document.getElementById(idSelect);
    select.innerHTML = `<option value="ALL">${textoDefault}</option>`;

    valores.forEach(valor => {
      if (valor) {
        const option = document.createElement("option");
        option.value = valor;
        option.textContent = valor;
        select.appendChild(option);
      }
    });
  }

  function obtenerUnicos(nombreColumna) {
    const set = new Set();

    elementosGlobal.forEach(reg => {
      const valor = obtenerValor(reg, nombreColumna);
      if (valor) set.add(valor);
    });

    return Array.from(set).sort();
  }

  function obtenerUnicosCircuito() {
    const set = new Set();

    elementosGlobal.forEach(reg => {
      const valor = reg.circuitoMostrar || obtenerValor(reg, COL.CIRCUITO);
      if (valor) set.add(valor);
    });

    return Array.from(set).sort();
  }

  function renderizarTabla() {
    const tbody = document.getElementById("tablaElementos");

    const estado = document.getElementById("filtroEstado").value;
    const prioridad = document.getElementById("filtroPrioridad").value;
    const circuito = document.getElementById("filtroCircuito").value;
    const material = document.getElementById("filtroMaterial").value;
    const idElemento = document.getElementById("filtroIdElemento").value.trim().toUpperCase();
    const fechaDesde = document.getElementById("fechaDesde").value;
    const fechaHasta = document.getElementById("fechaHasta").value;

    const sectorLogin = String(sessionStorage.getItem("sector") || "").trim().toUpperCase();

    let registros = elementosGlobal.filter(reg => {
      const regSector = obtenerValor(reg, COL.SECTOR).toUpperCase();
      const regEstado = obtenerValor(reg, COL.ESTADO).toUpperCase();
      const regPrioridad = obtenerValor(reg, COL.PRIORIDAD);
      const regCircuito = reg.circuitoMostrar || obtenerValor(reg, COL.CIRCUITO);
      const regMaterial = obtenerValor(reg, COL.MATERIAL);
      const regId = obtenerValor(reg, COL.ID_ELEMENTO).toUpperCase();

      const fechaBase =
        obtenerValor(reg, COL.FECHA_REGISTRO) ||
        obtenerValor(reg, COL.FECHA);

      const regFecha = convertirFechaInput(fechaBase);

      if (sectorLogin && regSector && regSector !== sectorLogin) return false;
      if (estado !== "ALL" && regEstado !== estado) return false;
      if (prioridad !== "ALL" && regPrioridad !== prioridad) return false;
      if (circuito !== "ALL" && regCircuito !== circuito) return false;
      if (material !== "ALL" && regMaterial !== material) return false;
      if (idElemento && !regId.includes(idElemento)) return false;
      if (fechaDesde && regFecha && regFecha < fechaDesde) return false;
      if (fechaHasta && regFecha && regFecha > fechaHasta) return false;

      return true;
    });

    registros.sort((a, b) => {
      const fa = convertirFechaInput(obtenerValor(a, COL.FECHA_REGISTRO) || obtenerValor(a, COL.FECHA));
      const fb = convertirFechaInput(obtenerValor(b, COL.FECHA_REGISTRO) || obtenerValor(b, COL.FECHA));
      return fb.localeCompare(fa);
    });

    if (registros.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="mensaje-tabla">No hay registros para mostrar.</td></tr>`;
      return;
    }

    tbody.innerHTML = "";

    registros.forEach(reg => {
      const id = obtenerValor(reg, COL.ID_ELEMENTO);
      const fechaBase = obtenerValor(reg, COL.FECHA_REGISTRO) || obtenerValor(reg, COL.FECHA);
      const fecha = formatearFecha(fechaBase);
      const circuito = reg.circuitoMostrar || obtenerValor(reg, COL.CIRCUITO);
      const direccion = obtenerValor(reg, COL.DIRECCION);
      const prioridad = obtenerValor(reg, COL.PRIORIDAD);
      const file = obtenerValor(reg, COL.FILE);

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="col-id">${escaparHtml(id)}</td>
        <td class="col-fecha">${escaparHtml(fecha)}</td>
        <td class="col-circuito">${escaparHtml(circuito)}</td>
        <td class="col-direccion">${escaparHtml(direccion)}</td>
        <td class="col-prioridad">${badgePrioridad(prioridad)}</td>
        <td class="col-acciones">
          <div class="acciones-td">
            <button class="btn-icon btn-pdf" onclick="abrirPDF('${escaparAtributo(file)}')">
              <i class="fas fa-file-pdf"></i> PDF
            </button>
            <button class="btn-icon btn-solicitar" onclick="abrirSolicitar('${escaparAtributo(id)}')">
              <i class="fas fa-paper-plane"></i> Solicitar
            </button>
            <button class="btn-icon btn-control" onclick="abrirControl('${escaparAtributo(id)}')">
              <i class="fas fa-check-circle"></i> Control
            </button>
          </div>
        </td>
      `;

      tbody.appendChild(tr);
    });
  }

  function actualizarResumen() {
    const sectorLogin = String(sessionStorage.getItem("sector") || "").trim().toUpperCase();

    let pendiente = 0;
    let solicitado = 0;
    let ejecutado = 0;

    elementosGlobal.forEach(reg => {
      const regSector = obtenerValor(reg, COL.SECTOR).toUpperCase();
      const estado = obtenerValor(reg, COL.ESTADO).toUpperCase();

      if (sectorLogin && regSector && regSector !== sectorLogin) return;

      if (estado === "PENDIENTE") pendiente++;
      if (estado === "SOLICITADO") solicitado++;
      if (estado === "EJECUTADO") ejecutado++;
    });

    document.getElementById("totalPendiente").textContent = pendiente;
    document.getElementById("totalSolicitado").textContent = solicitado;
    document.getElementById("totalEjecutado").textContent = ejecutado;
  }

  function obtenerValor(reg, nombreColumna) {
    if (!reg || !reg.obj) return "";
    const valor = reg.obj[nombreColumna];
    if (valor === null || valor === undefined) return "";
    return String(valor).trim();
  }

  function badgePrioridad(prioridad) {
    const p = String(prioridad || "").trim().toUpperCase();
    let clase = "";

    if (p === "ALTA") clase = "badge-alta";
    else if (p === "MEDIA") clase = "badge-media";
    else if (p === "BAJA") clase = "badge-baja";

    return `<span class="badge ${clase}">${escaparHtml(prioridad || "")}</span>`;
  }

  function abrirPDF(file) {
    if (!file) {
      alert("Este registro no tiene PDF.");
      return;
    }

    window.open(file, "_blank");
  }

  function abrirSolicitar(idElemento) {
    alert("Más adelante abrirá solicitar.html para: " + idElemento);
  }

  function abrirControl(idElemento) {
    alert("Más adelante abrirá control.html para: " + idElemento);
  }

  function limpiarFiltros() {
    document.getElementById("filtroEstado").value = "ALL";
    document.getElementById("filtroPrioridad").value = "ALL";
    document.getElementById("filtroCircuito").value = "ALL";
    document.getElementById("filtroMaterial").value = "ALL";
    document.getElementById("filtroIdElemento").value = "";
    document.getElementById("fechaDesde").value = "";
    document.getElementById("fechaHasta").value = "";

    renderizarTabla();
  }

  function cerrarSesion() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }

  function mostrarMensajeTabla(mensaje, error = false) {
    const tbody = document.getElementById("tablaElementos");
    tbody.innerHTML = `
      <tr>
        <td colspan="6" class="mensaje-tabla ${error ? "mensaje-error" : ""}">
          ${escaparHtml(mensaje)}
        </td>
      </tr>
    `;
  }

  function formatearFecha(valor) {
    const fechaInput = convertirFechaInput(valor);
    if (!fechaInput) return valor || "";

    const partes = fechaInput.split("-");
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }

  function convertirFechaInput(valor) {
    if (!valor) return "";

    valor = String(valor).trim();

    if (/^\d{4}-\d{2}-\d{2}/.test(valor)) {
      return valor.substring(0, 10);
    }

    const partes = valor.split(/[\/\s:]+/);

    if (partes.length >= 3) {
      let dia = partes[0].padStart(2, "0");
      let mes = partes[1].padStart(2, "0");
      let anio = partes[2];

      if (anio.length === 2) anio = "20" + anio;

      return `${anio}-${mes}-${dia}`;
    }

    return "";
  }

  function escaparHtml(texto) {
    return String(texto ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function escaparAtributo(texto) {
    return String(texto ?? "")
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/"/g, "&quot;")
      .replace(/\n/g, " ");
  }
</script>

</body>
</html>
